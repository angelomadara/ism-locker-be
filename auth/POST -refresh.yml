info:
  name: POST /refresh
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/refresh"
  body:
    type: json
    data: |-
      {
        "refreshToken": {{refreshToken}}
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const response = res.getBody()
        console.log(response.data)

        bru.setEnvVar("accessToken", response.data.token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
