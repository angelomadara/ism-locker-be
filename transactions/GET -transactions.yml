info:
  name: GET /transactions
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/v1/transactions?page=1&status=for_clearing&status=cleared"
  params:
    - name: page
      value: "1"
      type: query
    - name: status
      value: for_clearing
      type: query
    - name: status
      value: created
      type: query
      disabled: true
    - name: status
      value: completed
      type: query
      disabled: true
    - name: status
      value: expired
      type: query
      disabled: true
    - name: status
      value: cleared
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
